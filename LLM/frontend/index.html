<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLIP Chatbot — Teste</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }
    header span { font-size: 0.8rem; color: #64748b; }

    #status-pill {
      margin-left: auto;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: #1e293b;
      border: 1px solid #334155;
      cursor: pointer;
    }
    #status-pill.ok  { border-color: #22c55e; color: #22c55e; }
    #status-pill.err { border-color: #ef4444; color: #ef4444; }

    /* ── Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: 280px;
      min-width: 280px;
      background: #1a1d2e;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 16px;
      overflow-y: auto;
    }

    aside label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #64748b;
      display: block;
      margin-bottom: 6px;
    }

    aside input, aside textarea, aside select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.82rem;
      padding: 8px 10px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
      resize: vertical;
    }
    aside input:focus, aside textarea:focus { border-color: #6366f1; }

    .field { display: flex; flex-direction: column; }

    .divider {
      height: 1px;
      background: #2d3148;
    }

    /* ── Chat area ── */
    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* scrollbar */
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }

    .msg {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      background: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #2d3148;
    }

    .msg.bot .routes {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #2d3148;
      font-size: 0.75rem;
      color: #64748b;
    }

    .msg.bot .routes .route-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 4px;
      padding: 2px 6px 2px 6px;
      margin: 2px 2px 0 0;
      font-family: monospace;
    }

    .msg.bot .routes .route-chip a.clip-link {
      display: inline-flex;
      align-items: center;
      color: #6366f1;
      text-decoration: none;
      opacity: 0.8;
      transition: opacity .15s;
      line-height: 1;
    }

    .msg.bot .routes .route-chip a.clip-link:hover {
      opacity: 1;
    }

    .ics-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 7px 14px;
      background: #4f46e5;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .ics-btn:hover { background: #4338ca; }

    .msg.error {
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      align-self: flex-start;
    }

    .typing {
      align-self: flex-start;
      background: #1e293b;
      border: 1px solid #2d3148;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing span {
      width: 7px; height: 7px;
      background: #6366f1;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    .input-bar {
      border-top: 1px solid #2d3148;
      padding: 16px 24px;
      display: flex;
      gap: 10px;
      background: #1a1d2e;
    }

    #question {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      font-family: inherit;
      resize: none;
      transition: border-color .2s;
      max-height: 120px;
    }
    #question:focus { border-color: #6366f1; }

    #send-btn {
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1.1rem;
      padding: 0 18px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    #send-btn:hover { opacity: .85; }
    #send-btn:active { transform: scale(.96); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #334155;
      pointer-events: none;
    }
    .empty-state .icon { font-size: 3rem; }
    .empty-state p { font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">🎓</div>
  <div>
    <h1>CLIP Chatbot</h1>
    <span>FCT-UNL · Assistente académico</span>
  </div>
  <button id="status-pill" onclick="checkHealth()">Verificar servidor</button>
</header>

<div class="main">

  <!-- ── Sidebar ── -->
  <aside>
    <div class="field">
      <label>URL do Backend</label>
      <input id="backend-url" type="text" value="http://localhost:8000" />
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>Cookie de Sessão (obrigatório)</label>
      <textarea id="cookie" rows="4" placeholder="Ex: clip_session=abc123xyz..."></textarea>
    </div>

    <div class="field">
      <label>Ano Lectivo (opcional)</label>
      <input id="academic-year" type="text" placeholder="Ex: 2025/2026" />
    </div>

    <div class="divider"></div>

    <button onclick="clearChat()" style="
      background: transparent;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #64748b;
      padding: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: border-color .2s, color .2s;
    " onmouseover="this.style.borderColor='#6366f1';this.style.color='#a5b4fc'"
       onmouseout="this.style.borderColor='#2d3148';this.style.color='#64748b'">
      🗑 Limpar conversa
    </button>
  </aside>

  <!-- ── Chat ── -->
  <div class="chat-wrap">
    <div id="messages">
      <div class="empty-state" id="empty">
        <div class="icon">💬</div>
        <p>Faz uma pergunta sobre o teu percurso académico no CLIP</p>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="question" rows="1" placeholder="Ex: Quais são as minhas notas este semestre?" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<script>
  let history = [];

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  const questionEl = document.getElementById('question');
  questionEl.addEventListener('input', () => {
    questionEl.style.height = 'auto';
    questionEl.style.height = Math.min(questionEl.scrollHeight, 120) + 'px';
  });

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Health check ──────────────────────────────────────────────────────────
  async function checkHealth() {
    const pill = document.getElementById('status-pill');
    const base = document.getElementById('backend-url').value.trim();
    pill.textContent = '⌛ A verificar...';
    pill.className = '';
    try {
      const res = await fetch(`${base}/health`);
      const data = await res.json();
      pill.textContent = `✓ Online — ${data.routes_loaded} rotas`;
      pill.className = 'ok';
    } catch {
      pill.textContent = '✗ Sem resposta';
      pill.className = 'err';
    }
  }

  // ── Render messages ───────────────────────────────────────────────────────
  function appendMsg(role, text, routes, icsData) {
    const container = document.getElementById('messages');
    const empty = document.getElementById('empty');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;

    // Botão de download ICS
    if (icsData) {
      const btn = document.createElement('a');
      btn.className = 'ics-btn';
      btn.textContent = '📅 Descarregar horario_clip.ics';
      btn.href = 'data:text/calendar;base64,' + icsData;
      btn.download = 'horario_clip.ics';
      div.appendChild(btn);
    }

    if (routes && routes.length) {
      const routeDiv = document.createElement('div');
      routeDiv.className = 'routes';
      routeDiv.textContent = 'Rotas consultadas: ';
      routes.forEach(r => {
        const chip = document.createElement('span');
        chip.className = 'route-chip';

        const short = r.split('?')[0].replace('https://clip.fct.unl.pt', '');
        const label = document.createTextNode(short || r);
        chip.appendChild(label);
        chip.title = r;

        // só mostra o botão se for URL completa do CLIP
        if (r.startsWith('http')) {
          const a = document.createElement('a');
          a.className = 'clip-link';
          a.href = r;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.title = 'Abrir no CLIP';
          a.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
          chip.appendChild(a);
        }

        routeDiv.appendChild(chip);
      });
      div.appendChild(routeDiv);
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const empty = document.getElementById('empty');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing-indicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  // ── Send ──────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const base    = document.getElementById('backend-url').value.trim();
    const cookie  = document.getElementById('cookie').value.trim();
    const year    = document.getElementById('academic-year').value.trim();
    const qEl     = document.getElementById('question');
    const question = qEl.value.trim();

    if (!question) return;
    if (!cookie) {
      alert('Por favor insere o cookie de sessão do CLIP.');
      return;
    }

    // Show user message
    appendMsg('user', question);
    history.push({ role: 'user', content: question });

    qEl.value = '';
    qEl.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    showTyping();

    const body = {
      question,
      session_cookie: cookie,
      conversation_history: history.slice(-10),
    };
    if (year) body.academic_year = year;

    try {
      const res = await fetch(`${base}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        appendMsg('error', `Erro ${res.status}: ${err.detail || res.statusText}`);
      } else {
        const data = await res.json();
        appendMsg('bot', data.answer, data.routes_consulted, data.ics_data);
        history.push({ role: 'assistant', content: data.answer });
      }
    } catch (e) {
      removeTyping();
      appendMsg('error', `Não foi possível ligar ao servidor: ${e.message}`);
    }

    document.getElementById('send-btn').disabled = false;
    questionEl.focus();
  }

  // ── Clear ─────────────────────────────────────────────────────────────────
  function clearChat() {
    history = [];
    const container = document.getElementById('messages');
    container.innerHTML = `
      <div class="empty-state" id="empty">
        <div class="icon">💬</div>
        <p>Faz uma pergunta sobre o teu percurso académico no CLIP</p>
      </div>`;
  }
</script>
</body>
</html>
